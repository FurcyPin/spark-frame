[tox]
isolated_build = True
envlist = spark{35,40,41}

[testenv]
skip_install = true
allowlist_externals = poetry
commands_pre =
    poetry install
commands =
    pyspark --version
    pytest
deps =
    data-diff-viewer == 0.4.*
    pytest >= 7.4.3
    pytest-cov >= 4.1.0
    spark35: pyspark>=3.5.0,<3.6.0
    spark40: pyspark>=4.0.0,<4.1.0
    spark41: pyspark>=4.1.0,<4.2.0

